name: myapp
description: "A full-featured music and video player app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  just_audio: ^0.9.42
  video_player: ^2.9.1
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  audio_session: ^0.1.21
  flutter_slidable: ^3.1.2
  cached_network_image: ^3.4.1
  wakelock_plus: ^1.2.7
  lottie: ^3.1.3
  just_audio_media_kit: ^2.0.0
  media_kit_libs_linux: ^1.1.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1976D2"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
