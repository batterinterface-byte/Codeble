version: '3.8'
services:
  devonz:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - ~/.devonz:/home/node/.devonz
      - ~/devonz-projects:/home/node/projects
    environment:
      - NODE_ENV=production
      - PORT=5173
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173/api/health').then(r => process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
